syntax = "proto3";
package agent.v1;
import "cursor-conversation.proto";

// Purpose-minimal streaming, control, KV, heartbeat, and typed rejection schema.
message AgentClientMessage {
  oneof message {
    AgentRunRequest run_request = 1;
    ExecClientMessage exec_client_message = 2;
    KvClientMessage kv_client_message = 3;
    ConversationAction conversation_action = 4;
    ClientHeartbeat client_heartbeat = 7;
  }
}
message AgentServerMessage {
  oneof message {
    InteractionUpdate interaction_update = 1;
    ExecServerMessage exec_server_message = 2;
    ConversationStateStructure conversation_checkpoint_update = 3;
    KvServerMessage kv_server_message = 4;
  }
}
message ClientHeartbeat {}
message TextDeltaUpdate { string text = 1; }
message ThinkingDeltaUpdate { string text = 1; }
message TokenDeltaUpdate { int32 tokens = 1; }
message TurnEndedUpdate {}
message InteractionUpdate {
  oneof message {
    TextDeltaUpdate text_delta = 1;
    ThinkingDeltaUpdate thinking_delta = 4;
    TokenDeltaUpdate token_delta = 8;
    TurnEndedUpdate turn_ended = 14;
  }
}

message ShellArgs {}
message WriteArgs {}
message DeleteArgs {}
message GrepArgs {}
message ReadArgs {}
message LsArgs {}
message DiagnosticsArgs {}
message RequestContextArgs {}
message BackgroundShellSpawnArgs {}
message ListMcpResourcesExecArgs {}
message ReadMcpResourceExecArgs {}
message FetchArgs {}
message RecordScreenArgs {}
message ComputerUseArgs {}
message WriteShellStdinArgs {}
message ExecServerMessage {
  uint32 id = 1;
  oneof message {
    ShellArgs shell_args = 2;
    WriteArgs write_args = 3;
    DeleteArgs delete_args = 4;
    GrepArgs grep_args = 5;
    ReadArgs read_args = 7;
    LsArgs ls_args = 8;
    DiagnosticsArgs diagnostics_args = 9;
    RequestContextArgs request_context_args = 10;
    McpArgs mcp_args = 11;
    ShellArgs shell_stream_args = 14;
    BackgroundShellSpawnArgs background_shell_spawn_args = 16;
    ListMcpResourcesExecArgs list_mcp_resources_exec_args = 17;
    ReadMcpResourceExecArgs read_mcp_resource_exec_args = 18;
    FetchArgs fetch_args = 20;
    RecordScreenArgs record_screen_args = 21;
    ComputerUseArgs computer_use_args = 22;
    WriteShellStdinArgs write_shell_stdin_args = 23;
  }
  string exec_id = 15;
}

message ShellRejected { string command = 1; string working_directory = 2; string reason = 3; bool is_readonly = 4; }
message ShellResult { oneof result { ShellRejected rejected = 4; } }
message WriteRejected { string path = 1; string reason = 2; }
message WriteResult { oneof result { WriteRejected rejected = 6; } }
message DeleteRejected { string path = 1; string reason = 2; }
message DeleteResult { oneof result { DeleteRejected rejected = 6; } }
message GrepError { string error = 1; }
message GrepResult { oneof result { GrepError error = 2; } }
message ReadRejected { string path = 1; string reason = 2; }
message ReadResult { oneof result { ReadRejected rejected = 3; } }
message LsRejected { string path = 1; string reason = 2; }
message LsResult { oneof result { LsRejected rejected = 3; } }
message DiagnosticsResult {}
message ShellStream { oneof event { ShellRejected rejected = 5; } }
message BackgroundShellSpawnResult { oneof result { ShellRejected rejected = 3; } }
message FetchError { string url = 1; string error = 2; }
message FetchResult { oneof result { FetchError error = 2; } }
message WriteShellStdinError { string error = 1; }
message WriteShellStdinResult { oneof result { WriteShellStdinError error = 2; } }

message ExecClientMessage {
  uint32 id = 1;
  oneof message {
    ShellResult shell_result = 2;
    WriteResult write_result = 3;
    DeleteResult delete_result = 4;
    GrepResult grep_result = 5;
    ReadResult read_result = 7;
    LsResult ls_result = 8;
    DiagnosticsResult diagnostics_result = 9;
    RequestContextResult request_context_result = 10;
    McpResult mcp_result = 11;
    ShellStream shell_stream = 14;
    BackgroundShellSpawnResult background_shell_spawn_result = 16;
    McpResult list_mcp_resources_exec_result = 17;
    McpResult read_mcp_resource_exec_result = 18;
    FetchResult fetch_result = 20;
    McpResult record_screen_result = 21;
    McpResult computer_use_result = 22;
    WriteShellStdinResult write_shell_stdin_result = 23;
  }
  string exec_id = 15;
}

message GetBlobArgs { bytes blob_id = 1; }
message SetBlobArgs { bytes blob_id = 1; bytes blob_data = 2; }
message KvServerMessage {
  uint32 id = 1;
  oneof message { GetBlobArgs get_blob_args = 2; SetBlobArgs set_blob_args = 3; }
}
message GetBlobResult { optional bytes blob_data = 1; }
message SetBlobResult {}
message KvClientMessage {
  uint32 id = 1;
  oneof message { GetBlobResult get_blob_result = 2; SetBlobResult set_blob_result = 3; }
}
