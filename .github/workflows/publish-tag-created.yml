name: Publish tag created
run-name: Publish tag signal ${{ github.ref_name }}

# A create event evaluates this workflow's YAML from the created tag, so the
# contents of this file at any tag are untrusted and its `permissions`/checkout
# shape is NOT an enforceable security boundary. As checked into the default
# branch the listener is deliberately minimal: it requests no permissions and
# performs no checkout. That minimal shape only limits the blast radius of the
# committed definition; it is not what makes publishing safe. The security
# boundary is the protected default-branch publish.yml selected via
# workflow_run, plus the npm-publish environment and npm trusted-publisher
# controls, which revalidate every release input. This run is only a signal.
on:
    create:

permissions: {}

jobs:
    signal:
        name: Signal protected publisher
        runs-on: ubuntu-latest
        steps:
            - name: Record untrusted tag signal
              env:
                  REF_TYPE: ${{ github.ref_type }}
                  RELEASE_TAG: ${{ github.ref_name }}
                  TRIGGER_SHA: ${{ github.sha }}
                  WORKFLOW_REF: ${{ github.workflow_ref }}
              run: |
                  if [[ "$REF_TYPE" != "tag" ]]; then
                    echo "Rejecting non-tag create signal: ref_type=$REF_TYPE" >&2
                    exit 1
                  fi
                  printf 'Untrusted tag signal: tag=%s sha=%s workflow_ref=%s\n' \
                    "$RELEASE_TAG" "$TRIGGER_SHA" "$WORKFLOW_REF"
