telemetry = false

[install]
minimumReleaseAge = 259200 # 3 days in seconds
# Trusted first-party upstream; exempt from the age gate (its releases are consumed same-day)
minimumReleaseAgeExcludes = ["@earendil-works/pi-agent-core", "@earendil-works/pi-ai", "@earendil-works/pi-tui"]
linker = "hoisted"
exact = true
saveTextLockfile = true

[test]
preload = ["./test/setup-workflow-durability.ts"]

[run]
bun = true
